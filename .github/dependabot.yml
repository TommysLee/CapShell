version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:           # 添加标签便于分类
      - "dependencies"
      - "github-actions"
    commit-message:   # 自定义提交信息前缀
      prefix: "ci"
      include: "scope"