name: Build CapShell (Portable)

on:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: capshell-windows
            artifact_file: capshell-windows_x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: capshell-macos-arm
            artifact_file: capshell-macos_arm64.app
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: capshell-macos-intel
            artifact_file: capshell-macos-intel_x64.app
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: capshell-linux-x64
            artifact_file: capshell-linux_x64.AppImage
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: capshell-linux-arm64
            artifact_file: capshell-linux_arm64.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ---------- 缓存 Cargo（加速编译） ----------
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---------- 安装 Node.js & pnpm（版本 11） ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      # ---------- 手动缓存 pnpm store ----------
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ---------- Linux 依赖 ----------
      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # ---------- 构建 Tauri 应用（使用 pnpm 脚本） ----------
      - name: Build Tauri App (Portable)
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        with:
          projectPath: ./
          tauriScript: pnpm run tauri   # 使用 package.json 中定义的脚本
          args: --target ${{ matrix.target }}
          buildCommand: ""              # 跳过前端构建（Vanilla JS）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 整理产物 ----------
      - name: Prepare portable artifacts
        run: |
          mkdir -p artifacts
          SRC_DIR="src-tauri/target/${{ matrix.target }}/release"
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp $SRC_DIR/*.exe "artifacts/${{ matrix.artifact_file }}"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp -r $SRC_DIR/bundle/macos/*.app "artifacts/${{ matrix.artifact_file }}"
          elif [[ "${{ matrix.os }}" == ubuntu-* ]]; then
            cp $SRC_DIR/bundle/appimage/*.AppImage "artifacts/${{ matrix.artifact_file }}"
          fi
          
          # 复制配置文件示例和 JS-SDK
          cp src-tauri/default_config.json artifacts/config.json.example
          cp src/assets/js/sdk.js artifacts/sdk.js
        shell: bash

      # ---------- SLSA 签名（使用 Sigstore） ----------
      - name: Sign artifacts with SLSA
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'artifacts/${{ matrix.artifact_file }}'

      # ---------- 上传 Artifacts（用于调试） ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          if-no-files-found: error

      # ---------- 发布到 Release ----------
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*