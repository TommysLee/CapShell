<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Camera Pro</title>
  <link rel="stylesheet" href="assets/css/camera.css"/>
</head>
<body>
<!-- 主容器 -->
<div id="videoContainer">
  <!-- 视频流 -->
  <video id="video" autoplay playsinline muted class="full-cover mirror-effect"></video>
  <!-- 拍照预览 -->
  <img id="previewImg" class="full-cover hidden-el" alt="拍摄预览">
  <!-- 隐藏的 Canvas（用于截帧） -->
  <canvas id="canvas" class="hidden-el"></canvas>

  <!-- 错误遮罩 -->
  <div id="errorOverlay">
    <div class="error-icon">📷</div>
    <div class="error-message" id="errorMessage">摄像头不可用</div>
    <button class="error-retry" id="retryBtn">重试</button>
  </div>

  <!-- 顶部状态栏 -->
  <div class="top-bar">
    <svg viewBox="0 0 24 24">
      <path d="M21 6H3C1.9 6 1 6.9 1 8V16C1 17.1 1.9 18 3 18H21C22.1 18 23 17.1 23 16V8C23 6.9 22.1 6 21 6ZM21 16H3V8H21V16ZM5 10H7V14H5V10ZM9 10H11V14H9V10ZM13 10H15V14H13V10ZM17 10H19V14H17V10Z"/>
    </svg>
    <span id="resDisplay" class="status-text">初始化...</span>
  </div>
  <div id="closeBtn" class="top-bar btn-close">
    关闭
  </div>
</div>

<!-- 底部控制栏 -->
<div class="control-bar">
  <!-- 左侧：镜像开关 -->
  <div class="side-group">
    <label class="toggle-label">
      <input type="checkbox" id="mirrorToggle" class="toggle-input" checked>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span>镜像</span>
    </label>
  </div>

  <!-- 中间：操作区 -->
  <div class="center-action">
    <button id="captureBtn" class="shutter-btn" aria-label="拍照">
      <div class="shutter-inner"></div>
    </button>
    <div id="confirmGroup" class="confirm-actions hidden-el">
      <button id="retakeBtn" class="circle-btn btn-retake" aria-label="重拍">
        <svg viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
      <button id="confirmBtn" class="circle-btn btn-confirm" aria-label="确认使用">
        <svg viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 右侧占位平衡 -->
  <div class="spacer"></div>
</div>

<script>
  /**
   * ================================================================
   * 全屏相机模块 - 大师级实现
   * 功能：摄像头初始化、镜像、拍照、预览、重拍、确认、错误处理
   * 通信：通过 postMessage 与父窗口交互（符合 Shell 架构）
   * ================================================================
   */
  (function() {
    // ----- DOM 引用 -----
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('previewImg');
    const resDisplay = document.getElementById('resDisplay');
    const errorOverlay = document.getElementById('errorOverlay');
    const errorMessage = document.getElementById('errorMessage');

    const mirrorToggle = document.getElementById('mirrorToggle');
    const captureBtn = document.getElementById('captureBtn');
    const confirmGroup = document.getElementById('confirmGroup');
    const retakeBtn = document.getElementById('retakeBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const retryBtn = document.getElementById('retryBtn');
    const closeBtn = document.getElementById('closeBtn');

    // ----- 状态变量 -----
    let stream = null;               // 媒体流
    let currentBase64 = null;        // 当前拍摄的图片数据
    let facingMode = 'user';         // 'user' (前置) 或 'environment' (后置)
    let isCameraReady = false;

    // ----- 工具函数 -----

    /**
     * 隐藏错误遮罩
     */
    function hideError() {
      errorOverlay.classList.remove('show');
    }

    /**
     * 显示错误信息
     */
    function showError(msg) {
      errorMessage.textContent = msg || '摄像头不可用';
      errorOverlay.classList.add('show');
      resDisplay.textContent = '❌ 错误';
      resDisplay.classList.add('error');
    }

    /**
     * 更新分辨率显示
     */
    function updateResolution() {
      if (video.videoWidth && video.videoHeight) {
        resDisplay.textContent = `${video.videoWidth} × ${video.videoHeight}`;
        resDisplay.classList.remove('error');
      }
    }

    /**
     * 切换 UI 状态（拍照模式 / 预览模式）
     */
    function setUIState(mode) {
      const isPreview = (mode === 'preview');
      // 视频与预览图
      video.classList.toggle('hidden-el', isPreview);
      previewImg.classList.toggle('hidden-el', !isPreview);

      // 按钮组
      captureBtn.classList.toggle('hidden-el', isPreview);
      confirmGroup.classList.toggle('hidden-el', !isPreview);
    }

    /**
     * 清理摄像头资源
     */
    function releaseCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      isCameraReady = false;
    }

    /**
     * 向父窗口发送结果
     */
    function sendResult(imageData) {
      if (window.parent !== window) {
        // 发送给父窗口
        window.top.postMessage({
          type: 'CAMERA_RESULT',
          image: imageData,
        }, location.origin);
      } else {
        // 若不在 iframe 中，则使用 console 输出（开发调试）
        console.log('[Camera] 拍照结果:', imageData.substring(0, 50) + '...');
      }
    }

    /**
     * 摄像头初始化
     */
    async function initCamera() {
      try {
        // 释放旧资源
        releaseCamera();

        const constraints = {
          video: {
            facingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;

        // 等待元数据加载
        return new Promise((resolve) => {
          video.onloadedmetadata = () => {
            updateResolution();
            isCameraReady = true;
            hideError();
            resolve();
          };
          // 若已经加载完成（缓存情况）
          if (video.videoWidth) {
            updateResolution();
            isCameraReady = true;
            hideError();
            resolve();
          }
        });
      } catch (err) {
        console.error('[Camera] 初始化失败:', err);
        showError('无法访问摄像头，请检查权限或硬件连接。');
        throw err;
      }
    }

    /**
     * 拍照逻辑
     */
    function capturePhoto() {
      if (!isCameraReady || !stream) {
        console.warn('[Camera] 摄像头未就绪，无法拍照');
        return;
      }
      // 设置 Canvas 尺寸与视频一致
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');

      // 应用镜像（在 Canvas 层面翻转）
      if (mirrorToggle.checked) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // 导出为 JPEG Base64（高质量）
      currentBase64 = canvas.toDataURL('image/jpeg', 0.95);

      // 显示预览
      previewImg.src = currentBase64;
      setUIState('preview');
    }

    // ----- UI 事件绑定 -----

    // 镜像切换
    mirrorToggle.addEventListener('change', () => {
      // 实时视频镜像（CSS）
      if (mirrorToggle.checked) {
        video.classList.add('mirror-effect');
      } else {
        video.classList.remove('mirror-effect');
      }
    });

    // 拍照按钮
    captureBtn.addEventListener('click', capturePhoto);

    // 重拍
    retakeBtn.addEventListener('click', () => {
      currentBase64 = null;
      previewImg.src = '';
      setUIState('camera');
    });

    // 确认（发送结果）
    confirmBtn.addEventListener('click', () => {
      if (currentBase64) {
        sendResult(currentBase64);
      }
    });

    // 重试按钮（错误遮罩）
    retryBtn.addEventListener('click', () => {
      hideError();
      initCamera().catch(() => {});
    });

    // 关闭按钮
    closeBtn.addEventListener('click', () => {
      if (window.parent !== window) {
        window.top.$.closeCamera();
      }
    });

    // ----- 生命周期管理 -----

    /**
     * 页面关闭前释放资源
     */
    function cleanup() {
      releaseCamera();
    }

    // 监听页面卸载
    window.addEventListener('beforeunload', cleanup);
    // 对于移动端，pagehide 可能更可靠
    window.addEventListener('pagehide', cleanup);

    // ----- 启动相机 -----

    // 页面加载完成后初始化
    window.addEventListener('load', () => {
      // 默认界面为拍照模式
      setUIState('camera');
      // 设置初始镜像（默认开启）
      mirrorToggle.checked = true;
      video.classList.add('mirror-effect');

      // 启动摄像头
      initCamera().catch(() => {});
    });

    // 暴露清理方法给父页面（可选）
    window.cleanupCamera = cleanup;

    // 暴露拍照方法（便于父页面通过引用调用，但非必须）
    window.capturePhoto = capturePhoto;

    console.log('[Camera] 相机模块已加载，等待启动。');
  })();
</script>
</body>
</html>
